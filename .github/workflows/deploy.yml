name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r images dist/
          ls -la dist/

      # 既存プロジェクトの一覧を取得して、なければ作成
      - name: Ensure Cloudflare Pages project exists
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          echo "=== List existing projects ==="
          LIST_RESPONSE=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects" \
            -H "Authorization: Bearer ${CF_TOKEN}")
          echo "$LIST_RESPONSE" | head -c 3000
          echo ""

          # プロジェクト名が含まれてるか確認
          if echo "$LIST_RESPONSE" | grep -q '"name":"fujimura-dental-lp"'; then
            echo "✅ Project 'fujimura-dental-lp' already exists, skipping create"
          else
            echo "=== Project not found, creating... ==="
            CREATE_RESPONSE=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name":"fujimura-dental-lp"}')
            echo "Response: $CREATE_RESPONSE"
            if echo "$CREATE_RESPONSE" | grep -q '"success":true'; then
              echo "✅ Project created"
            else
              echo "⚠️ Create returned non-success but continuing"
            fi
          fi
          # エラーでも続行
          exit 0

      - name: Deploy to Cloudflare Pages
        uses: AdrianGonz97/refined-cf-pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fujimura-dental-lp
          directory: dist
          deploymentName: Production
