name: Deploy to Cloudflare Pages

# main ブランチに push されたら自動でデプロイする
on:
  push:
    branches: [main]
  # 手動実行も可能にしておく（GitHub Actions の画面からポチっと押せる）
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      # 1. GitHub からコードを取得
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. デプロイに不要なファイルを削除（AI生成元画像、バックアップHTML、Macのゴミ）
      - name: Clean up unused files
        run: |
          rm -f "Generated Image"*.png
          rm -f "index v"*.html
          rm -f .DS_Store
          find . -name "._*" -delete
          echo "=== クリーン後のファイル一覧 ==="
          ls -la

      # 3. Cloudflare Pages にデプロイ（プロジェクトがなければ自動作成）
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=fujimura-dental-lp --branch=main --commit-dirty=true
