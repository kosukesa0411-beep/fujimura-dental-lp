name: Deploy to Cloudflare Pages

# main ブランチに push されたら自動でデプロイ
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      # 1. GitHub からコードを取得
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. デプロイ用フォルダを準備（index.html と images/ だけコピー）
      - name: Prepare deploy directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r images dist/
          echo "=== dist の中身 ==="
          ls -la dist/

      # 3. Cloudflare Pages にデプロイ（API直叩き、wrangler不使用）
      - name: Deploy to Cloudflare Pages
        uses: AdrianGonz97/refined-cf-pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fujimura-dental-lp
          directory: dist
          deploymentName: Production
