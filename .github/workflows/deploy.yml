name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r images dist/
          echo "=== dist の中身 ==="
          ls -la dist/

      # 🩺 デバッグ: トークンが有効か確認
      - name: Debug - Verify API token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Account ID length: ${#CF_ACCOUNT} (expect 32) ==="
          echo "=== Token first 5 chars: ${CF_TOKEN:0:5}... ==="
          echo ""
          echo "=== Token verify API ==="
          curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json"
          echo ""
          echo ""
          echo "=== List existing Pages projects ==="
          curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" | head -c 2000
          echo ""

      # プロジェクト作成（存在しなければ）
      - name: Ensure Cloudflare Pages project exists
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Try to create project ==="
          HTTP_CODE=$(curl -sS -o /tmp/cf-response.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"fujimura-dental-lp","production_branch":"main"}')
          echo "HTTP Code: $HTTP_CODE"
          echo "Response:"
          cat /tmp/cf-response.json
          echo ""
          # 200 = created, 409 = exists. 400 with duplicate msg = exists too
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "409" ]; then
            echo "✅ Project ready"
          elif grep -qiE "already exists|duplicate|conflict" /tmp/cf-response.json; then
            echo "✅ Project already exists, continuing"
          else
            echo "❌ Unexpected response"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: AdrianGonz97/refined-cf-pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fujimura-dental-lp
          directory: dist
          deploymentName: Production
